<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Serene</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="login">

<nav class="navbar">
  <a class="navbar-brand" href="index.html">Serene</a>
  <div class="navbar-nav">
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    <a href="signup.html" class="btn-nav-cta">Create Account →</a>
  </div>
</nav>

<div class="auth-page z1">
  <div class="auth-container">

    <div class="auth-header">
      <div class="auth-logo">Serene</div>
      <div class="auth-subtitle">Your mental wellness companion</div>
    </div>

    <div class="auth-card">
      <h2>Welcome back</h2>
      <p>Sign in to continue your journey</p>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input type="email" class="form-input" id="loginEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="password-wrap">
            <input type="password" class="form-input" id="loginPassword" placeholder="Your password" required>
            <button type="button" class="password-toggle" id="passwordToggle">👁</button>
          </div>
        </div>
        <div style="display:flex;justify-content:flex-end;margin-bottom:20px;">
          <a href="#" style="font-size:0.85rem;color:var(--accent)">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Sign In</button>
      </form>

      <div class="auth-footer mt-4">
        Don't have an account? <a href="signup.html">Create one</a>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
